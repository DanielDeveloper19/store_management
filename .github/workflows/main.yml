name: Java CI with Quality and Security Gates

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          # SonarCloud needs the full history for better analysis (blame, versioning)
          fetch-depth: 0 

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build, Test, and Analyze
        env:
          # These tokens are mandatory for SonarCloud to communicate
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -Dspring.profiles.active=test \
          -Dsonar.projectKey=danieldeveloper19_storemanagement \
          -Dsonar.organization=danieldeveloper19 \
          -Dsonar.host.url=https://sonarcloud.io

  security-and-package:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # This creates a lowercase version of the repo name for the entire job
      IMAGE_NAME: "" 
    steps:
      - uses: actions/checkout@v4
      
      # Step to force lowercase
      - name: Set Image Name to Lowercase
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set Short SHA
        id: vars
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/${{ env.IMAGE_NAME }}:latest .
          docker build -t ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.SHA_SHORT }} .

      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.SHA_SHORT }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          docker push ghcr.io/${{ env.IMAGE_NAME }}:latest
          docker push ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.SHA_SHORT }}

      - name: Update Helm Values in External Repo
        env:
          # Use your PAT here
          API_TOKEN_GITHUB: ${{ secrets.MY_PAT }}
        run: |
          # 1. Clone the Helm repository
          git clone https://x-access-token:${API_TOKEN_GITHUB}@github.com/DanielDeveloper19/Store_Management_KubernetesManifests.git
          
          # 2. Navigate to the cloned folder and update the values.yaml
          cd Store_Management_KubernetesManifests
          sed -i "s/tag: .*/tag: \"${{ steps.vars.outputs.SHA_SHORT }}\"/" storeManagement_chart/values.yaml
          
          # 3. Commit and push the changes back to the Helm repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add storeManagement_chart/values.yaml
          git commit -m "Update image tag to ${{ steps.vars.outputs.SHA_SHORT }}"
          git push
