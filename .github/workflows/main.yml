name: Java CI with Quality and Security Gates

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          # SonarCloud needs the full history for better analysis (blame, versioning)
          fetch-depth: 0 

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build, Test, and Analyze
        env:
          # These tokens are mandatory for SonarCloud to communicate
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -Dspring.profiles.active=test \
          -Dsonar.projectKey=danieldeveloper19_storemanagement \
          -Dsonar.organization=danieldeveloper19 \
          -Dsonar.host.url=https://sonarcloud.io

  # 3. SECURITY SCAN & DOCKER BUILD
  security-and-package:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      # Build the Docker image locally first
      - name: Build Docker Image
        run: docker build -t ghcr.io/${{ github.repository }}:latest .

      # Scan the local image for vulnerabilities
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}:latest'
          format: 'table'
          exit-code: '1' # This fails the pipeline if "High" vulnerabilities are found
          severity: 'CRITICAL,HIGH'

      # Log in to GitHub Container Registry
      - name: Log into GHCR
        if: success()
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Push the verified image
      - name: Push to GHCR
        if: success()
        run: docker push ghcr.io/${{ github.repository }}:latest
