name: Java CI with Quality and Security Gates

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # 1. BUILD AND UNIT and Integration TESTs
  build-and-test:
    runs-on: ubuntu-latest
    # This creates a "disposable" DB for your tests
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: store_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # This single command runs Unit Tests AND Integration Tests
      - name: Build and Verify
        run: mvn clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/store_db
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root

  # 2. CODE QUALITY (SonarCloud)
  # Note: Requires SONAR_TOKEN in GitHub Secrets
  quality-gate:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SonarCloud Scan
        run: mvn sonar:sonar -Dsonar.projectKey=YOUR_PROJECT_KEY -Dsonar.organization=YOUR_ORG -Dsonar.host.url=https://sonarcloud.io
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # 3. SECURITY SCAN & DOCKER BUILD
  security-and-package:
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      # Build the Docker image locally first
      - name: Build Docker Image
        run: docker build -t ghcr.io/${{ github.repository }}:latest .

      # Scan the local image for vulnerabilities
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}:latest'
          format: 'table'
          exit-code: '1' # This fails the pipeline if "High" vulnerabilities are found
          severity: 'CRITICAL,HIGH'

      # Log in to GitHub Container Registry
      - name: Log into GHCR
        if: success()
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Push the verified image
      - name: Push to GHCR
        if: success()
        run: docker push ghcr.io/${{ github.repository }}:latest
