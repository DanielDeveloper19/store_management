name: Java CI with Quality and Security Gates

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          # SonarCloud needs the full history for better analysis (blame, versioning)
          fetch-depth: 0 

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build, Test, and Analyze
        env:
          # These tokens are mandatory for SonarCloud to communicate
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -Dspring.profiles.active=test \
          -Dsonar.projectKey=danieldeveloper19_storemanagement \
          -Dsonar.organization=danieldeveloper19 \
          -Dsonar.host.url=https://sonarcloud.io

  security-and-package:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # This creates a lowercase version of the repo name for the entire job
      IMAGE_NAME: "" 
    steps:
      - uses: actions/checkout@v4
      
      # Step to force lowercase
      - name: Set Image Name to Lowercase
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # Now use ${{ env.IMAGE_NAME }} instead of github.repository
      - name: Build Docker Image
        run: docker build -t ghcr.io/${{ env.IMAGE_NAME }}:latest .

      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ env.IMAGE_NAME }}:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: docker push ghcr.io/${{ env.IMAGE_NAME }}:latest
